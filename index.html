<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>8 Mart Kutlu Olsun ✨</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <section id="start-screen">
        <div class="header-container">
            <h1 class="glow-text">8 Mart Dünya Kadınlar Günün Kutlu Olsun!</h1>
            <p class="instruction">Balonları kenara çek ve oyuna başla! 🎈</p>
        </div>
        
        <div id="button-wrapper">
            <button id="start-btn">OYUNA BAŞLA</button>
            <div id="balloon-container"></div>
        </div>
    </section>

    <section id="game-container" style="display: none;">
        <div class="game-ui">
            <div class="stat-box">Puan: <span id="current-score">0</span></div>
            <div class="stat-box highscore">Rekor: <span id="high-score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </section>

    <div id="game-over-overlay" style="display: none;">
        <div class="modal">
            <h2 id="result-title">Olsun, bişi olmaz!</h2>
            <p>Skorun: <strong id="final-score">0</strong></p>
            <div class="button-group">
                <button onclick="restartGame()">Tekrar Dene</button>
                <button onclick="location.reload()" class="secondary">Ana Sayfa</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
